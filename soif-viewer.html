<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folievoordelen SOIF Sampleboek | Dé specialist in keuken renovatie</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;600&display=swap');

  :root {
    --gold: #C6A84B;
    --gold-light: #E8D48B;
    --gold-dark: #9A7F2E;
    --dark: #1E2328;
    --dark-mid: #2A3038;
    --dark-light: #353D47;
    --text: #E8E6E1;
    --text-muted: #9BA1A8;
    --border: rgba(198, 168, 75, 0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: 'Lato', sans-serif;
    background: var(--dark);
    color: var(--text);
    overflow: hidden;
  }

  /* ── Top Bar ── */
  .topbar {
    height: 70px;
    background: linear-gradient(135deg, var(--dark) 0%, var(--dark-mid) 100%);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    position: relative;
    z-index: 10;
  }

  .topbar::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .brand img {
    height: 50px;
    width: 50px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .brand-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.5px;
    line-height: 1.2;
  }

  .brand-text span {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 300;
  }

  .catalog-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .catalog-title h2 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .catalog-title .badge {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--dark);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    letter-spacing: 0.5px;
  }

  .btn-gold {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
    color: var(--dark);
    box-shadow: 0 2px 12px rgba(198, 168, 75, 0.3);
  }

  .btn-gold:hover {
    box-shadow: 0 4px 20px rgba(198, 168, 75, 0.5);
    transform: translateY(-1px);
  }

  .btn-outline {
    background: transparent;
    color: var(--gold-light);
    border: 1px solid var(--border);
  }

  .btn-outline:hover {
    background: rgba(198, 168, 75, 0.1);
    border-color: var(--gold);
  }

  .btn svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  /* ── PDF Viewer Area ── */
  .viewer-wrapper {
    height: calc(100vh - 70px - 48px);
    background: var(--dark-mid);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .viewer-wrapper::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(198, 168, 75, 0.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(198, 168, 75, 0.02) 0%, transparent 60%);
    pointer-events: none;
  }

  .pdf-embed {
    width: 100%;
    height: 100%;
    border: none;
  }

  .loading-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 5;
    background: var(--dark-mid);
    transition: opacity 0.5s ease;
  }

  .loading-state.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--dark-light);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-state p {
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  /* ── Bottom Bar ── */
  .bottombar {
    height: 48px;
    background: var(--dark);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    position: relative;
  }

  .bottombar::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .bottombar-left {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .bottombar-left .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    display: inline-block;
  }

  .bottombar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .bottombar-right a {
    color: var(--gold-light);
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: color 0.2s;
  }

  .bottombar-right a:hover {
    color: var(--gold);
  }

  .contact-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    .topbar {
      height: auto;
      padding: 12px 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .catalog-title { display: none; }

    .brand img { height: 40px; width: 40px; }
    .brand-text h1 { font-size: 17px; }

    .actions { margin-left: auto; }

    .btn { padding: 8px 14px; font-size: 12px; }
    .btn span.label { display: none; }

    .viewer-wrapper { height: calc(100vh - 110px - 48px); }

    .bottombar { padding: 0 16px; }
    .bottombar-right a.hide-mobile { display: none; }
  }

  /* ── Fullscreen ── */
  .viewer-wrapper.fullscreen {
    position: fixed;
    inset: 0;
    height: 100vh !important;
    z-index: 100;
  }
</style>
</head>
